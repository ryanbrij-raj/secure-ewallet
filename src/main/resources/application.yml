# ============================================================
#  Secure E-Wallet — Application Configuration
# ============================================================

spring:
  application:
    name: secure-ewallet

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ewallet_db}
    username: ${DB_USERNAME:ewallet_user}
    # No insecure default — DB_PASSWORD must be set explicitly (see .env.example)
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — never let Hibernate touch it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=24h   # idempotency key TTL

# ============================================================
#  JWT
# ============================================================
jwt:
  # No insecure default — JWT_SECRET must be set explicitly (see .env.example)
  # Generate with: openssl rand -base64 48
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 900000        # 15 minutes
  refresh-token-expiry-ms: 604800000    # 7 days

# ============================================================
#  Encryption (AES-256 for PII at rest)
# ============================================================
encryption:
  # No insecure default — ENCRYPTION_KEY must be set explicitly (see .env.example)
  # Generate with: openssl rand -hex 32
  secret-key: ${ENCRYPTION_KEY}

# ============================================================
#  Business Rules
# ============================================================
wallet:
  max-daily-transfer: 50000.00
  supported-currencies: USD,EUR,GBP,JPY,CAD,AUD,CHF,SGD

# ============================================================
#  Actuator
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ============================================================
#  Logging
# ============================================================
logging:
  level:
    com.ewallet: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
